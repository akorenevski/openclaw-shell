<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Gateway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 3rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .subtitle {
            color: #666;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        a.card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 3.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        a.card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -20px rgba(0, 217, 255, 0.3);
        }
        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .card-label {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .card-desc {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.5rem;
        }
        .logout {
            margin-top: 3rem;
        }
        .logout a {
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .logout a:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-icon">🦞</div>
        <h1>OpenClaw</h1>
        <p class="subtitle">Gateway</p>
        <div class="links">
            <a href="/dashboard/" class="card">
                <span class="card-icon">🤖</span>
                <span class="card-label">Dashboard</span>
                <span class="card-desc">AI Assistant</span>
            </a>
            <a href="/files/" class="card">
                <span class="card-icon">📁</span>
                <span class="card-label">Files</span>
                <span class="card-desc">File Browser</span>
            </a>
            <a href="/setup" class="card">
                <span class="card-icon">⚙️</span>
                <span class="card-label">Settings</span>
                <span class="card-desc">Gateway Config</span>
            </a>
        </div>
        <p class="logout"><a href="/logout">Sign out</a></p>
    </div>
</body>
</html>
